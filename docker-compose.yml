# Local-testing convenience. Unraid users should use the template XML in
# docker/pokefolio.xml instead — same image, just orchestrated by Unraid.
services:
  pokefolio:
    build: .
    image: pokefolio:latest
    container_name: pokefolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Berlin"
      DATABASE_URL: "file:/app/data/pokefolio.db"
    volumes:
      - ./.data/db:/app/data
      - ./.data/uploads:/app/public/uploads
